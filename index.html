<body>
<nav style="background:#0f172a;padding:0 16px;display:flex;justify-content:center;gap:0;position:sticky;top:0;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.35)">
  <a href="index.html" id="nav-dashboard" style="display:flex;align-items:center;gap:6px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;text-decoration:none;border-bottom:3px solid transparent;transition:all .18s">🏆 Dashboard</a>
  <a href="workout.html" id="nav-workout" style="display:flex;align-items:center;gap:6px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;text-decoration:none;border-bottom:3px solid transparent;transition:all .18s">🗓️ Workout</a>
  <a href="nutrition.html" id="nav-nutrition" style="display:flex;align-items:center;gap:6px;padding:14px 18px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;text-decoration:none;border-bottom:3px solid transparent;transition:all .18s">🍽️ Nutrition</a>
</nav>
<script>
(function(){
  var path = window.location.pathname;
  var active = path.includes('workout') ? 'nav-workout' : path.includes('nutrition') ? 'nav-nutrition' : 'nav-dashboard';
  var links = document.querySelectorAll('nav a');
  links.forEach(function(a){
    if(a.id === active){
      a.style.color = '#fff';
      a.style.borderBottomColor = '#dc2626';

      a.style.color = 'rgba(255,255,255,.45)';

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const PARTICIPANTS = ["Natty","Bank","Ple","Sarah","May","Geem","Khim","Oath","O","Jay"];
const WEEKS = [0,2,4,6,8,10,12];
const STORAGE_KEY = "fit12_data_v3";
const PHOTOS_KEY  = "fit12_photos_v2";
const PROFILE_KEY = "fit12_profiles_v2";
const START_DATE  = new Date("2025-06-16");

const C = {
  bg:"#f5f7fa", bgCard:"#ffffff", bgCard2:"#f8f9fc",
  border:"#e2e8f0", redBorder:"#fecaca", blueBorder:"#bfdbfe",
  red:"#dc2626", redLight:"#ef4444", redBg:"#fef2f2",
  blue:"#1d4ed8", blueLight:"#2563eb", blueBg:"#eff6ff",
  navy:"#0f172a", gold:"#d97706", goldBg:"#fffbeb", goldBorder:"#fde68a",
  green:"#16a34a", greenBg:"#f0fdf4",
  text:"#0f172a", textMid:"#334155", textLight:"#64748b", textFaint:"#94a3b8",
  silver:"#94a3b8",
};

function getWeekLabel(w){
  const d=new Date(START_DATE); d.setDate(d.getDate()+w*7);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}
function loadJSON(key){try{const r=localStorage.getItem(key);return r?JSON.parse(r):{}}catch{return{}}}
function saveJSON(key,val){localStorage.setItem(key,JSON.stringify(val))}
function getLatestEntry(records){
  const weeks=Object.keys(records).map(Number).sort((a,b)=>b-a);
  for(const w of weeks)if(records[w]?.fat!=null)return{week:w,...records[w]};
  return null;
}
function calcScore(records){
  const base=records[0]; if(!base)return null;
  const latest=getLatestEntry(records); if(!latest||latest.week===0)return null;
  const fatDelta=base.fat-latest.fat;
  const muscleDelta=latest.muscle-base.muscle;
  const weightDelta=base.weight!=null&&latest.weight!=null?base.weight-latest.weight:null;
  return{fatDelta,muscleDelta,total:fatDelta+muscleDelta,weightDelta,latestWeek:latest.week};
}
function rankParticipants(data){
  return PARTICIPANTS.map(name=>{
    const records=data[name]||{};
    return{name,records,score:calcScore(records)};
  }).sort((a,b)=>{
    if(!a.score&&!b.score)return 0;
    if(!a.score)return 1;if(!b.score)return -1;
    return b.score.total-a.score.total;
  });
}
function readFile(file,cb){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>cb(e.target.result);
  r.readAsDataURL(file);
}

function Avatar({src,name,size=40}){
  const initials=name.slice(0,2).toUpperCase();
  const COLS=["#dc2626","#1d4ed8","#b91c1c","#1e40af","#7f1d1d","#1e3a8a","#c2410c","#2563eb","#991b1b"];
  const idx=name.split("").reduce((a,c)=>a+c.charCodeAt(0),0)%COLS.length;
  return src
    ?<img src={src} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:`2px solid ${C.border}`,flexShrink:0}}/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:COLS[idx],display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.36,fontWeight:800,color:"#fff",flexShrink:0,border:"2px solid rgba(0,0,0,.08)"}}>{initials}</div>;
}

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t)},[onDone]);
  return <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:C.navy,color:"#fff",fontWeight:700,padding:"13px 28px",borderRadius:14,zIndex:9999,boxShadow:"0 8px 32px rgba(15,23,42,.25)",fontSize:14,animation:"fadeUp .25s ease",whiteSpace:"nowrap"}}>{msg}</div>;
}

function Bar({value,max,color,bg}){
  const pct=max?Math.min(100,(Math.abs(value)/Math.abs(max))*100):0;
  return(
    <div style={{background:bg||"#e2e8f0",borderRadius:99,height:7,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,background:color,height:"100%",borderRadius:99,transition:"width .7s cubic-bezier(.4,0,.2,1)"}}/>
    </div>
  );
}

function ScoreModal({onClose}){
  const tableData=[["","Week 0","Week 12"],["Body fat","25.0%","20.0%"],["Muscle","35.0%","38.0%"],["Weight","70 kg","65 kg"]];
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9200,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bgCard,borderRadius:20,padding:28,maxWidth:480,width:"100%",border:`1px solid ${C.border}`,boxShadow:"0 20px 60px rgba(15,23,42,.2)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontSize:19,fontWeight:800,color:C.text}}>📊 How Points Work</h3>
          <button onClick={onClose} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.textLight,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontWeight:600}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:C.redBg,borderRadius:14,padding:16,border:`1px solid ${C.redBorder}`}}>
            <div style={{fontWeight:800,color:C.red,marginBottom:6,fontSize:13}}>Formula</div>
            <div style={{fontFamily:"monospace",fontSize:16,color:C.navy,lineHeight:1.8,fontWeight:700}}>Score = Fat Lost (%) + Muscle Gained (%)</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:4}}>Both measured vs your Week 0 baseline scan</div>
          </div>
          <div style={{background:C.blueBg,borderRadius:14,padding:16,border:`1px solid ${C.blueBorder}`}}>
            <div style={{fontWeight:800,color:C.blue,marginBottom:12,fontSize:13}}>Worked Example</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,fontSize:12}}>
              {tableData.map((row,i)=>row.map((cell,j)=>(
                <div key={`${i}-${j}`} style={{padding:"7px 8px",borderRadius:8,textAlign:"center",background:i===0||j===0?"rgba(30,64,175,.08)":"#fff",color:i===0||j===0?C.blue:C.text,fontWeight:i===0||j===0?700:500,fontSize:i===0||j===0?10:13,border:`1px solid ${C.blueBorder}`}}>{cell}</div>
              )))}
            </div>
            <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",justifyContent:"space-between",background:C.redBg,padding:"8px 12px",borderRadius:10,border:`1px solid ${C.redBorder}`}}>
                <span style={{color:C.red,fontWeight:600,fontSize:13}}>Fat lost: 25% − 20%</span>
                <span style={{color:C.red,fontWeight:800,fontSize:13}}>+5.0 pts</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",background:C.greenBg,padding:"8px 12px",borderRadius:10,border:"1px solid #bbf7d0"}}>
                <span style={{color:C.green,fontWeight:600,fontSize:13}}>Muscle gained: 38% − 35%</span>
                <span style={{color:C.green,fontWeight:800,fontSize:13}}>+3.0 pts</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",background:C.goldBg,padding:"10px 12px",borderRadius:10,border:`1px solid ${C.goldBorder}`}}>
                <span style={{color:C.gold,fontWeight:800,fontSize:14}}>🏆 Total Score</span>
                <span style={{color:C.gold,fontWeight:900,fontSize:18}}>+8.0%</span>
              </div>
            </div>
          </div>
          <div style={{background:C.goldBg,borderRadius:12,padding:14,border:`1px solid ${C.goldBorder}`,fontSize:13,color:C.textMid}}>
            <span style={{color:C.gold,fontWeight:700}}>⚖️ About Weight (kg): </span>
            Tracked for reference only — does <b>not</b> affect your score. Only fat % and muscle % count.
          </div>
        </div>
      </div>
    </div>
  );
}

function PhotoModal({name,photos,profiles,onClose}){
  const before=photos[name]?.before, after=photos[name]?.after;
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9000,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bgCard,borderRadius:20,padding:28,maxWidth:640,width:"100%",border:`1px solid ${C.border}`,boxShadow:"0 20px 60px rgba(15,23,42,.2)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <Avatar src={profiles[name]} name={name} size={44}/>
            <div><h3 style={{fontSize:18,fontWeight:800,color:C.text}}>{name}</h3><p style={{fontSize:12,color:C.textLight}}>Progress Photos</p></div>
          </div>
          <button onClick={onClose} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.textLight,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontWeight:600}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {[["Before · Week 0",before,C.red,C.redBg,C.redBorder],["After · Latest",after,C.blue,C.blueBg,C.blueBorder]].map(([label,src,col,bg,br])=>(
            <div key={label}>
              <div style={{fontSize:11,color:col,marginBottom:8,textTransform:"uppercase",letterSpacing:".1em",fontWeight:700}}>{label}</div>
              {src?<img src={src} style={{width:"100%",borderRadius:14,objectFit:"cover",aspectRatio:"3/4",border:`2px solid ${br}`}}/>
                  :<div style={{width:"100%",aspectRatio:"3/4",background:bg,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",color:C.textFaint,fontSize:13,border:`2px dashed ${br}`}}>No photo yet</div>}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ProfileModal({name,current,onSave,onClose}){
  const [preview,setPreview]=useState(current||null);
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9100,padding:16}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bgCard,borderRadius:20,padding:28,maxWidth:340,width:"100%",border:`1px solid ${C.border}`,boxShadow:"0 20px 60px rgba(15,23,42,.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontSize:18,fontWeight:800,color:C.text}}>Profile · {name}</h3>
          <button onClick={onClose} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.textLight,borderRadius:10,padding:"6px 14px",cursor:"pointer",fontWeight:600}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
          {preview?<img src={preview} style={{width:120,height:120,borderRadius:"50%",objectFit:"cover",border:`3px solid ${C.red}`}}/>
                  :<div style={{width:120,height:120,borderRadius:"50%",background:C.redBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,border:`2px dashed ${C.redBorder}`}}>👤</div>}
          <label style={{background:C.redBg,border:`1px solid ${C.redBorder}`,borderRadius:12,padding:"11px 28px",cursor:"pointer",color:C.red,fontWeight:700,fontSize:14}}>
            Choose Photo
            <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>readFile(e.target.files[0],setPreview)}/>
          </label>
          <button onClick={()=>{onSave(preview);onClose();}} style={{background:`linear-gradient(135deg,${C.red},${C.blue})`,color:"#fff",fontWeight:800,fontSize:15,padding:"13px 0",borderRadius:12,border:"none",cursor:"pointer",width:"100%",boxShadow:"0 4px 16px rgba(220,38,38,.3)"}}>Save Profile Photo</button>
        </div>
      </div>
    </div>
  );
}

const IS={width:"100%",background:"#fff",border:`1.5px solid #e2e8f0`,borderRadius:10,padding:"11px 14px",color:"#0f172a",fontSize:15,outline:"none",appearance:"none",WebkitAppearance:"none",boxShadow:"0 1px 3px rgba(0,0,0,.06)"};
const LS={display:"block",fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6};

function App(){
  const [tab,setTab]=useState("leaderboard");
  const [data,setData]=useState(()=>loadJSON(STORAGE_KEY));
  const [photos,setPhotos]=useState(()=>loadJSON(PHOTOS_KEY));
  const [profiles,setProfiles]=useState(()=>loadJSON(PROFILE_KEY));
  const [toast,setToast]=useState(null);
  const [photoModal,setPhotoModal]=useState(null);
  const [profileModal,setProfileModal]=useState(null);
  const [scoreModal,setScoreModal]=useState(false);
  const [fName,setFName]=useState("");
  const [fWeek,setFWeek]=useState(0);
  const [fFat,setFFat]=useState("");
  const [fMuscle,setFMuscle]=useState("");
  const [fWeight,setFWeight]=useState("");
  const [fBefore,setFBefore]=useState(null);
  const [fAfter,setFAfter]=useState(null);

  const ranked=rankParticipants(data);
  const currentWeek=(()=>{const all=Object.values(data).flatMap(r=>Object.keys(r).map(Number));return all.length?Math.max(...all):0;})();

  function handleCheckin(e){
    e.preventDefault();
    if(!fName)return setToast("⚠️ Select your name");
    if(fFat===""||fMuscle==="")return setToast("⚠️ Enter fat % and muscle %");
    const entry={fat:+fFat,muscle:+fMuscle};
    if(fWeight!=="")entry.weight=+fWeight;
    const updated={...data,[fName]:{...(data[fName]||{}),[fWeek]:entry}};
    saveJSON(STORAGE_KEY,updated);setData(updated);
    if(fBefore||fAfter){
      const p={...photos,[fName]:{...(photos[fName]||{})}};
      if(fBefore)p[fName].before=fBefore;
      if(fAfter)p[fName].after=fAfter;
      saveJSON(PHOTOS_KEY,p);setPhotos(p);
    }
    setToast(`✅ ${fName} · Week ${fWeek} saved!`);
    setFFat("");setFMuscle("");setFWeight("");setFBefore(null);setFAfter(null);
    setTab("leaderboard");
  }

  function saveProfile(name,src){
    const p={...profiles,[name]:src};saveJSON(PROFILE_KEY,p);setProfiles(p);
    setToast(`✅ ${name}'s photo updated`);
  }

  const maxScore=ranked[0]?.score?.total||1;
  const TABS=[["leaderboard","🏆","Leaderboard"],["checkin","📋","Check In"],["photos","📸","Photos"]];

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>

      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#7f1d1d 100%)",padding:"40px 16px 36px",textAlign:"center"}}>
        <div style={{fontSize:11,letterSpacing:".2em",fontWeight:700,color:"rgba(255,255,255,.6)",textTransform:"uppercase",marginBottom:10}}>12-Week Body Transformation</div>
        <h1 style={{fontSize:"clamp(28px,6vw,52px)",fontWeight:900,letterSpacing:"-.03em",color:"#ffffff",lineHeight:1.05}}>THE CHALLENGE</h1>
        <p style={{color:"rgba(255,255,255,.6)",marginTop:8,fontSize:13}}>Starts 16 June 2025 · Check-in every 2 weeks · Ends 8 September 2025</p>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:24,flexWrap:"wrap"}}>
          {[["🥇 1st Place","฿10,000","#fbbf24","rgba(251,191,36,.15)","rgba(251,191,36,.4)"],
            ["🥈 2nd Place","฿5,000","#e2e8f0","rgba(255,255,255,.1)","rgba(255,255,255,.3)"]].map(([label,prize,col,bg,border])=>(
            <div key={label} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:16,padding:"12px 28px"}}>
              <div style={{fontSize:10,color:col,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",opacity:.85}}>{label}</div>
              <div style={{fontSize:26,fontWeight:900,color:col}}>{prize}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:16,display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",borderRadius:20,padding:"6px 18px",fontSize:12,color:"rgba(255,255,255,.85)",fontWeight:600}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"#4ade80",display:"inline-block",boxShadow:"0 0 8px #4ade80"}}/>
          Week {currentWeek} of 12 active
        </div>
      </header>

      {/* TABS */}
      <div style={{background:"#fff",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"center",gap:0}}>
        {TABS.map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{border:"none",cursor:"pointer",fontWeight:700,fontSize:14,padding:"16px 20px",background:"transparent",color:tab===id?C.red:C.textLight,borderBottom:`3px solid ${tab===id?C.red:"transparent"}`,transition:"all .18s"}}>
            {icon} {label}
          </button>
        ))}
      </div>

      <main style={{maxWidth:860,margin:"28px auto 0",padding:"0 16px"}}>

        {/* LEADERBOARD */}
        {tab==="leaderboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <button onClick={()=>setScoreModal(true)} style={{background:C.blueBg,border:`1px solid ${C.blueBorder}`,borderRadius:12,padding:"13px 18px",fontSize:14,color:C.textMid,display:"flex",gap:12,alignItems:"center",cursor:"pointer",width:"100%",textAlign:"left",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
              <span style={{fontSize:18}}>📊</span>
              <span><b style={{color:C.blue}}>Score = % Fat Lost + % Muscle Gained</b> vs your Week 0 baseline. Weight tracked but not scored.</span>
              <span style={{marginLeft:"auto",color:C.blue,fontSize:13,fontWeight:700,flexShrink:0,background:C.blueBg,border:`1px solid ${C.blueBorder}`,borderRadius:8,padding:"4px 12px"}}>How? →</span>
            </button>

            {ranked.map((p,i)=>{
              const has=!!p.score, top2=has&&i<2;
              const fat=p.score?.fatDelta??0, mus=p.score?.muscleDelta??0, tot=p.score?.total??0;
              const wD=p.score?.weightDelta;
              const medal=["🥇","🥈","🥉"];
              const av=profiles[p.name];
              const hasPhotos=photos[p.name]?.before||photos[p.name]?.after;
              const baseW=p.records[0]?.weight;
              const latestEntry=getLatestEntry(p.records||{});
              const latestW=latestEntry?.weight;
              // Mini history rows — all weeks that have data
              const historyWeeks=WEEKS.filter(w=>p.records[w]);
              return(
                <div key={p.name} className="chov" style={{background:"#fff",border:`1.5px solid ${top2?C.red:C.border}`,borderRadius:14,padding:"16px 20px",boxShadow:top2?"0 2px 12px rgba(220,38,38,.12)":"0 1px 4px rgba(0,0,0,.05)"}}>
                  {/* Top row */}
                  <div style={{display:"grid",gridTemplateColumns:"44px 52px 1fr auto",gap:14,alignItems:"center"}}>
                    <div style={{textAlign:"center"}}>
                      {i<3&&has?<span style={{fontSize:26}}>{medal[i]}</span>:<span style={{fontSize:16,fontWeight:800,color:C.textFaint}}>{i+1}</span>}
                    </div>
                    <div style={{cursor:"pointer"}} onClick={()=>setProfileModal(p.name)} title="Update profile photo">
                      <Avatar src={av} name={p.name} size={46}/>
                    </div>
                    <div>
                      {/* Name + weight change pill */}
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:has?8:0}}>
                        <span style={{fontWeight:800,fontSize:16,color:C.text}}>{p.name}</span>
                        {/* Weight change: show baseline → latest with arrow */}
                        {baseW!=null&&latestW!=null&&latestEntry.week>0?(
                          <span style={{fontSize:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,
                            background: wD>0?C.greenBg:wD<0?"#fef2f2":C.bg,
                            color: wD>0?C.green:wD<0?C.red:C.textFaint,
                            padding:"2px 9px",borderRadius:20,
                            border:`1px solid ${wD>0?"#bbf7d0":wD<0?C.redBorder:C.border}`}}>
                            {baseW}kg → {latestW}kg&nbsp;
                            {wD>0?`▼ −${wD.toFixed(1)}kg`:wD<0?`▲ +${Math.abs(wD).toFixed(1)}kg`:"→ 0kg"}
                          </span>
                        ):baseW!=null?(
                          <span style={{fontSize:11,color:C.textFaint,background:C.bg,padding:"2px 9px",borderRadius:20,fontWeight:600,border:`1px solid ${C.border}`}}>{baseW} kg</span>
                        ):latestW!=null?(
                          <span style={{fontSize:11,color:C.textFaint,background:C.bg,padding:"2px 9px",borderRadius:20,fontWeight:600,border:`1px solid ${C.border}`}}>{latestW} kg</span>
                        ):null}
                        {!p.records[0]&&<span style={{fontSize:11,color:C.textFaint,background:C.bg,padding:"2px 9px",borderRadius:20,fontWeight:600,border:`1px solid ${C.border}`}}>No baseline yet</span>}
                      </div>
                      {has&&(
                        <div style={{display:"flex",flexDirection:"column",gap:6}}>
                          <div style={{display:"flex",gap:10,alignItems:"center"}}>
                            <span style={{fontSize:12,color:C.red,width:76,fontWeight:700,flexShrink:0}}>Fat −{fat.toFixed(1)}%</span>
                            <div style={{flex:1}}><Bar value={fat} max={maxScore} color={C.red} bg="#fee2e2"/></div>
                          </div>
                          <div style={{display:"flex",gap:10,alignItems:"center"}}>
                            <span style={{fontSize:12,color:C.blue,width:76,fontWeight:700,flexShrink:0}}>Musc +{mus.toFixed(1)}%</span>
                            <div style={{flex:1}}><Bar value={mus} max={maxScore} color={C.blue} bg="#dbeafe"/></div>
                          </div>
                        </div>
                      )}
                    </div>
                    <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                      {has&&<div style={{fontSize:22,fontWeight:900,color:top2?C.red:C.textMid}}>{tot>0?"+":""}{tot.toFixed(2)}%</div>}
                      {has&&top2&&<div style={{fontSize:11,color:C.red,fontWeight:700,background:C.redBg,padding:"3px 10px",borderRadius:20,border:`1px solid ${C.redBorder}`}}>{i===0?"1st Prize 🥇":"2nd Prize 🥈"}</div>}
                      {hasPhotos&&<button onClick={()=>setPhotoModal(p.name)} style={{background:C.blueBg,border:`1px solid ${C.blueBorder}`,color:C.blue,borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>📸 Photos</button>}
                      {has&&<div style={{fontSize:11,color:C.textFaint}}>wk {p.score.latestWeek}</div>}
                    </div>
                  </div>

                  {/* Mini week-by-week history */}
                  {historyWeeks.length>0&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,fontWeight:700,color:C.textFaint,textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}}>Check-in History</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {historyWeeks.map(w=>{
                          const entry=p.records[w];
                          const isBase=w===0;
                          const prevWeeks=historyWeeks.filter(pw=>pw<w);
                          const prevW=prevWeeks.length?p.records[prevWeeks[prevWeeks.length-1]]:null;
                          const fatChange=prevW?entry.fat-prevW.fat:null;
                          const muscChange=prevW?entry.muscle-prevW.muscle:null;
                          return(
                            <div key={w} style={{
                              background:isBase?C.bg:fatChange!=null&&fatChange<0?C.greenBg:C.bg,
                              border:`1px solid ${isBase?C.border:fatChange!=null&&fatChange<0?"#bbf7d0":C.border}`,
                              borderRadius:10,padding:"7px 10px",minWidth:72,flex:"0 0 auto"
                            }}>
                              <div style={{fontSize:10,fontWeight:800,color:isBase?C.textFaint:C.blue,marginBottom:3}}>
                                {isBase?"Baseline":`Week ${w}`}
                              </div>
                              {entry.weight!=null&&(
                                <div style={{fontSize:11,color:C.textMid,fontWeight:600,marginBottom:2}}>⚖️ {entry.weight}kg</div>
                              )}
                              <div style={{fontSize:11,color:C.red,fontWeight:700}}>
                                🔴 {entry.fat}%
                                {fatChange!=null&&<span style={{color:fatChange<0?C.green:C.red,fontSize:10,marginLeft:3}}>({fatChange>0?"+":""}{fatChange.toFixed(1)})</span>}
                              </div>
                              <div style={{fontSize:11,color:C.blue,fontWeight:700,marginTop:1}}>
                                🔵 {entry.muscle}%
                                {muscChange!=null&&<span style={{color:muscChange>0?C.green:C.red,fontSize:10,marginLeft:3}}>({muscChange>0?"+":""}{muscChange.toFixed(1)})</span>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* CHECK-IN */}
        {tab==="checkin"&&(
          <div style={{maxWidth:460,margin:"0 auto"}}>
            <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:18,padding:28,boxShadow:"0 2px 12px rgba(0,0,0,.07)"}}>
              <h2 style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:4}}>📋 Submit Check-in</h2>
              <p style={{fontSize:13,color:C.textLight,marginBottom:24}}>Enter your numbers from the InBody / body scan sheet.</p>
              <div style={{display:"flex",flexDirection:"column",gap:16}}>
                <div>
                  <label style={LS}>Your Name</label>
                  <select value={fName} onChange={e=>setFName(e.target.value)} style={IS}>
                    <option value="">— Select your name —</option>
                    {PARTICIPANTS.map(n=><option key={n}>{n}</option>)}
                  </select>
                </div>

                {fName&&(
                  <div style={{display:"flex",alignItems:"center",gap:12,background:C.redBg,borderRadius:12,padding:"12px 16px",cursor:"pointer",border:`1px solid ${C.redBorder}`}} onClick={()=>setProfileModal(fName)}>
                    <Avatar src={profiles[fName]} name={fName} size={38}/>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:C.red}}>Profile Photo</div>
                      <div style={{fontSize:12,color:C.textLight}}>{profiles[fName]?"Tap to change photo":"Tap to upload your photo"}</div>
                    </div>
                    <span style={{marginLeft:"auto",color:C.textFaint,fontSize:20}}>›</span>
                  </div>
                )}

                <div>
                  <label style={LS}>Check-in Week</label>
                  <select value={fWeek} onChange={e=>setFWeek(+e.target.value)} style={IS}>
                    {WEEKS.map(w=><option key={w} value={w}>Week {w} · {getWeekLabel(w)}{w===0?" · Baseline (do this first)":w===12?" · Final":""}</option>)}
                  </select>
                </div>

                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                  <div style={{fontSize:11,color:C.textFaint,textTransform:"uppercase",letterSpacing:".12em",fontWeight:700,marginBottom:14}}>Body Scan Numbers</div>
                  <div style={{marginBottom:14}}>
                    <label style={LS}>Weight (kg) <span style={{color:C.textFaint,fontWeight:500,textTransform:"none",fontSize:11,letterSpacing:0}}>— reference only</span></label>
                    <div style={{position:"relative"}}>
                      <input type="number" step="0.1" min="30" max="200" value={fWeight} onChange={e=>setFWeight(e.target.value)} placeholder="e.g. 65.0" style={IS}/>
                      <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:C.textFaint,fontSize:14,fontWeight:600}}>kg</span>
                    </div>
                  </div>
                  <div style={{marginBottom:14}}>
                    <label style={LS}>Body Fat % <span style={{color:C.red,fontWeight:700}}>↓ lower = better score</span></label>
                    <div style={{position:"relative"}}>
                      <input type="number" step="0.1" min="1" max="60" value={fFat} onChange={e=>setFFat(e.target.value)} placeholder="e.g. 22.5" style={IS} required/>
                      <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:C.textFaint,fontSize:14,fontWeight:600}}>%</span>
                    </div>
                  </div>
                  <div>
                    <label style={LS}>Skeletal Muscle % <span style={{color:C.blue,fontWeight:700}}>↑ higher = better score</span></label>
                    <div style={{position:"relative"}}>
                      <input type="number" step="0.1" min="10" max="80" value={fMuscle} onChange={e=>setFMuscle(e.target.value)} placeholder="e.g. 38.2" style={IS} required/>
                      <span style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",color:C.textFaint,fontSize:14,fontWeight:600}}>%</span>
                    </div>
                  </div>
                </div>

                {fName&&data[fName]?.[0]&&fFat!==""&&fMuscle!==""&&+fWeek>0&&(()=>{
                  const base=data[fName][0];
                  const fatD=base.fat-+fFat, musD=+fMuscle-base.muscle, tot=fatD+musD;
                  return(
                    <div style={{background:C.goldBg,border:`1px solid ${C.goldBorder}`,borderRadius:12,padding:"14px 16px"}}>
                      <div style={{fontSize:11,color:C.gold,fontWeight:800,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Score Preview</div>
                      <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                        <div style={{textAlign:"center",flex:1,background:"#fff",borderRadius:10,padding:"8px 4px",border:`1px solid ${C.goldBorder}`}}>
                          <div style={{fontSize:11,color:C.textLight,marginBottom:2}}>Fat</div>
                          <div style={{fontSize:15,fontWeight:800,color:C.red}}>{fatD>=0?"+":""}{fatD.toFixed(1)}</div>
                        </div>
                        <div style={{textAlign:"center",flex:1,background:"#fff",borderRadius:10,padding:"8px 4px",border:`1px solid ${C.goldBorder}`}}>
                          <div style={{fontSize:11,color:C.textLight,marginBottom:2}}>Muscle</div>
                          <div style={{fontSize:15,fontWeight:800,color:C.blue}}>{musD>=0?"+":""}{musD.toFixed(1)}</div>
                        </div>
                        <div style={{textAlign:"center",flex:1,background:C.gold,borderRadius:10,padding:"8px 4px"}}>
                          <div style={{fontSize:11,color:"rgba(255,255,255,.85)",marginBottom:2}}>Score</div>
                          <div style={{fontSize:15,fontWeight:900,color:"#fff"}}>{tot>=0?"+":""}{tot.toFixed(1)}%</div>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                  <div style={{fontSize:11,color:C.textFaint,textTransform:"uppercase",letterSpacing:".12em",fontWeight:700,marginBottom:12}}>Progress Photos (optional)</div>
                  {[["Before photo","before",fBefore,setFBefore,fWeek===0],["After / latest","after",fAfter,setFAfter,fWeek>0]].map(([label,key,preview,setter,show])=>show&&(
                    <div key={key} style={{marginBottom:12}}>
                      <label style={LS}>{label}</label>
                      <label style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",background:C.bg,border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"13px 16px"}}>
                        {preview?<img src={preview} style={{width:52,height:52,borderRadius:10,objectFit:"cover",border:`1px solid ${C.border}`}}/>:<span style={{fontSize:26}}>📷</span>}
                        <span style={{fontSize:13,color:C.textLight,fontWeight:600}}>{preview?"Change photo":"Upload photo"}</span>
                        <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>readFile(e.target.files[0],setter)}/>
                      </label>
                    </div>
                  ))}
                </div>

                <button onClick={handleCheckin} style={{background:`linear-gradient(135deg,${C.red},${C.blue})`,color:"#fff",fontWeight:800,fontSize:16,padding:"15px 0",borderRadius:12,border:"none",cursor:"pointer",marginTop:4,boxShadow:"0 4px 16px rgba(220,38,38,.3)",letterSpacing:".02em"}}>Save Check-in →</button>
              </div>
            </div>

            {fName&&data[fName]&&Object.keys(data[fName]).length>0&&(
              <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginTop:14,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                <div style={{fontWeight:700,marginBottom:12,color:C.textMid,fontSize:13,textTransform:"uppercase",letterSpacing:".08em"}}>{fName}'s Check-in History</div>
                <div style={{display:"grid",gridTemplateColumns:"60px 70px 1fr 1fr",gap:8,marginBottom:8,fontSize:11,color:C.textFaint,textTransform:"uppercase",letterSpacing:".07em",fontWeight:700}}>
                  <span>Week</span><span>Weight</span><span>Body Fat</span><span>Muscle</span>
                </div>
                {WEEKS.filter(w=>data[fName][w]).map(w=>(
                  <div key={w} style={{display:"grid",gridTemplateColumns:"60px 70px 1fr 1fr",gap:8,padding:"10px 0",borderTop:`1px solid ${C.border}`,fontSize:13,alignItems:"center"}}>
                    <span style={{color:C.textLight,fontWeight:600}}>Wk {w}</span>
                    <span style={{color:C.textMid,fontWeight:600}}>{data[fName][w].weight!=null?`${data[fName][w].weight} kg`:"—"}</span>
                    <span style={{color:C.red,fontWeight:700}}>{data[fName][w].fat}%</span>
                    <span style={{color:C.blue,fontWeight:700}}>{data[fName][w].muscle}%</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* PHOTOS */}
        {tab==="photos"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
            {PARTICIPANTS.map(name=>{
              const av=profiles[name], hB=!!photos[name]?.before, hAny=hB||!!photos[name]?.after;
              const sc=ranked.find(p=>p.name===name)?.score;
              return(
                <div key={name} className="chov" style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                  <div style={{aspectRatio:"1",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:hAny?"pointer":"default",overflow:"hidden",position:"relative"}} onClick={()=>hAny&&setPhotoModal(name)}>
                    {hB?<img src={photos[name].before} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Avatar src={av} name={name} size={72}/>}
                    {hAny&&<div style={{position:"absolute",bottom:8,right:8,background:C.blue,borderRadius:8,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>B/A</div>}
                  </div>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontWeight:800,fontSize:14,color:C.text}}>{name}</div>
                      <button onClick={()=>setProfileModal(name)} style={{background:C.redBg,border:`1px solid ${C.redBorder}`,borderRadius:6,padding:"3px 8px",fontSize:11,color:C.red,cursor:"pointer",fontWeight:700}}>✏️</button>
                    </div>
                    {sc?<div style={{fontSize:12,color:C.red,fontWeight:700,marginTop:5}}>{sc.total>=0?"+":""}{sc.total.toFixed(1)}% score</div>
                       :<div style={{fontSize:12,color:C.textFaint,marginTop:5}}>No data yet</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </main>

      {/* TIMELINE */}
      <div style={{maxWidth:860,margin:"28px auto 0",padding:"0 16px"}}>
        <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
          <div style={{fontSize:11,color:C.textFaint,fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",marginBottom:14}}>Challenge Timeline · Starts 16 Jun 2025</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {WEEKS.map(w=>{
              const done=w<currentWeek, cur=w===currentWeek;
              return(
                <div key={w} style={{flex:1,minWidth:72,textAlign:"center",padding:"10px 4px",borderRadius:10,background:cur?C.redBg:done?C.blueBg:C.bg,border:`1.5px solid ${cur?C.redBorder:done?C.blueBorder:C.border}`}}>
                  <div style={{fontSize:12,fontWeight:800,color:cur?C.red:done?C.blue:C.textFaint}}>Wk {w}</div>
                  <div style={{fontSize:10,color:cur?C.red:done?C.blue:C.textFaint,marginTop:2}}>{getWeekLabel(w)}</div>
                  <div style={{fontSize:10,marginTop:3,color:cur?C.red:done?C.blue:C.textFaint}}>{w===0?"Start":w===12?"Final":cur?"Now ⏳":done?"✅":"—"}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {scoreModal&&<ScoreModal onClose={()=>setScoreModal(false)}/>}
      {photoModal&&<PhotoModal name={photoModal} photos={photos} profiles={profiles} onClose={()=>setPhotoModal(null)}/>}
      {profileModal&&<ProfileModal name={profileModal} current={profiles[profileModal]} onSave={src=>saveProfile(profileModal,src)} onClose={()=>setProfileModal(null)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
