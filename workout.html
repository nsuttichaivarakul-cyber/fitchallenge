<script>
(function(){

// Day pattern: Mon=upper, Tue=lower, Wed=cardio, Thu=core, Fri=full, Sat=rest, Sun=rest
const DAY_TYPES = ["upper","lower","cardio","core","full","rest","rest"];
const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

function getPhase(weekNum) {
  if(weekNum <= 4) return 1;
  if(weekNum <= 8) return 2;
  return 3;
}

function getWorkout(type, phase) {
  if(type === "rest") return null;
  return WORKOUTS[type][phase];
}

function getDate(weekNum, dayOfWeek) {
  const d = new Date(START);
  d.setDate(d.getDate() + (weekNum-1)*7 + dayOfWeek);
  return d;
}

function formatDate(d) {
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}

function isScanWeek(w) { return SCAN_WEEKS.includes(w); }
function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function openModal(weekNum, dayIdx) {
  const type = DAY_TYPES[dayIdx];
  if(type === "rest") return;
  const phase = getPhase(weekNum);
  const workout = getWorkout(type, phase);
  const ts = TYPE_STYLE[type];
  const d = getDate(weekNum, dayIdx);
  const scan = isScanWeek(weekNum);

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Week ${weekNum} · ${DAY_NAMES[dayIdx]} ${formatDate(d)}</div>
        <h3 style="font-size:18px;font-weight:800;color:#0f172a">${workout.title}</h3>
      </div>
      <button onclick="closeModal()" style="background:#f1f5f9;border:none;border-radius:10px;padding:6px 14px;cursor:pointer;font-weight:600;color:#64748b;flex-shrink:0;margin-left:12px">✕</button>
    </div>`;

  if(scan) {
    html += `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#d97706;font-weight:600">📏 Scan Week — remember to do your InBody check-in this week!</div>`;
  }

  html += `<div class="steps-bar">🚶 Goal: 10,000 steps today on top of this workout</div>`;
  html += `<div style="margin-top:16px;margin-bottom:10px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em">Exercises</div>`;

  workout.exercises.forEach((ex,i) => {
    html += `
      <div class="ex-card" style="border-left-color:${ts.color}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div>
            <div style="font-weight:700;font-size:14px;color:#0f172a;margin-bottom:2px">${i+1}. ${ex.name}</div>
            <div style="font-size:13px;color:#1d4ed8;font-weight:600;margin-bottom:4px">${ex.sets}</div>
            <div style="font-size:12px;color:#64748b">💡 ${ex.tip}</div>
          </div>
        </div>
        <a href="${ex.yt}" target="_blank" class="yt-btn">▶ Watch Demo</a>
      </div>`;
  });

  html += `
    <div style="margin-top:16px;background:#f8f9fc;border-radius:12px;padding:12px 16px;border:1px solid #e2e8f0">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Phase ${phase} Tips</div>
      <div style="font-size:13px;color:#475569">${phase===1?"Focus on form, not speed. Take rest when needed. Every rep counts.":phase===2?"Push a little harder each week. Rest 45 sec between sets.":"Go for it — this is your final push. Minimal rest, max effort."}</div>
    </div>`;

  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-overlay").classList.remove("hidden");
}

function closeModal(e) {
  if(!e || e.target === document.getElementById("modal-overlay")) {
    document.getElementById("modal-overlay").classList.add("hidden");
  }
}

// BUILD CALENDAR
function buildCalendar() {
  const cal = document.getElementById("calendar");
  let currentPhase = 0;
  let html = "";

  for(let w=1; w<=12; w++) {
    const phase = getPhase(w);
    const phaseInfo = PHASES[phase-1];

    // Phase header
    if(phase !== currentPhase) {
      currentPhase = phase;
      const pColor = phase===1?"#1e3a8a":phase===2?"#7c2d12":"#14532d";
      html += `
        <div style="background:linear-gradient(135deg,${pColor},${phase===1?"#1e40af":phase===2?"#991b1b":"#166534"});color:#fff;border-radius:14px;padding:16px 20px;margin-bottom:12px;margin-top:${phase>1?'28px':'0'}">
          <div style="font-size:13px;font-weight:900">${phaseInfo.label}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:3px">${phaseInfo.sub}</div>
        </div>`;
    }

    const scanBadge = isScanWeek(w) ? `<span class="scan-badge">📏 Scan Week</span>` : "";
    html += `<div class="week-label" style="margin-top:16px">WEEK ${w} ${scanBadge}</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:4px">`;

    for(let d=0; d<7; d++) {
      const type = DAY_TYPES[d];
      const ts = TYPE_STYLE[type];
      const date = getDate(w, d);
      const today = isToday(date);
      const isRest = type === "rest";

      html += `
        <div class="day-card ${isRest?'rest':''}"
          onclick="${!isRest?`openModal(${w},${d})`:'void(0)'}"
          style="background:${ts.bg};border-color:${today?'#0f172a':ts.border};${today?'box-shadow:0 0 0 2px #0f172a;':''}">
          <div style="font-size:9px;font-weight:700;color:${ts.color};margin-bottom:2px">${DAY_NAMES[d]}</div>
          <div style="font-size:10px;color:#94a3b8;margin-bottom:4px">${formatDate(date)}</div>
          <div style="font-size:14px">${ts.emoji}</div>
          <div style="font-size:9px;font-weight:600;color:${ts.color};margin-top:3px;line-height:1.2">${ts.label}</div>
          ${today?`<div style="font-size:8px;background:#0f172a;color:#fff;border-radius:4px;padding:1px 4px;margin-top:3px;font-weight:700">TODAY</div>`:''}
        </div>`;
    }
    html += `</div>`;
  }

  // Steps reminder
  html += `
    <div style="background:linear-gradient(135deg,#0f172a,#1e3a8a);border-radius:14px;padding:20px;margin-top:28px;text-align:center">
      <div style="font-size:24px;margin-bottom:8px">🚶</div>
      <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:4px">10,000 Steps Every Single Day</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6)">Including rest days. Track with your phone health app.</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px">
        <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.8)">📱 iPhone: Health App</div>
        <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.8)">📱 Android: Google Fit</div>
        <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:8px 16px;font-size:12px;color:rgba(255,255,255,.8)">⌚ Any step tracker</div>
      </div>
    </div>`;

  cal.innerHTML = html;
}

buildCalendar();
</script>
</body>
</html>
